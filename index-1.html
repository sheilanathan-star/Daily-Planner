<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e1117">
<title>Daily Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --surface: #161b26;
    --surface2: #1e2536;
    --border: rgba(255,255,255,0.07);
    --accent1: #e8c97e;   /* gold */
    --accent2: #7eb8e8;   /* blue */
    --accent3: #a78bfa;   /* violet */
    --text: #e8e6e0;
    --muted: #6b7280;
    --done-bg: rgba(255,255,255,0.04);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 12px) 0 env(safe-area-inset-bottom, 12px);
  }

  /* ── HEADER ── */
  header {
    padding: 20px 20px 14px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .date-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .date-block p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .progress-ring-wrap {
    position: relative;
    width: 52px;
    height: 52px;
  }

  .progress-ring-wrap svg {
    transform: rotate(-90deg);
    width: 52px;
    height: 52px;
  }

  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 4; }
  .ring-fill {
    fill: none;
    stroke: var(--accent1);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 138;
    stroke-dashoffset: 138;
    transition: stroke-dashoffset 0.6s ease;
  }

  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent1);
  }

  /* ── SCROLL AREA ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: none;
  }
  main::-webkit-scrollbar { display: none; }

  /* ── SECTION CARD ── */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    animation: slideUp 0.4s ease both;
  }

  .section:nth-child(1) { animation-delay: 0.05s; }
  .section:nth-child(2) { animation-delay: 0.12s; }
  .section:nth-child(3) { animation-delay: 0.19s; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .icon-tasks  { background: rgba(232,201,126,0.15); }
  .icon-comms  { background: rgba(126,184,232,0.15); }
  .icon-home   { background: rgba(167,139,250,0.15); }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    flex: 1;
  }

  .section-count {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* ── ITEMS ── */
  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
    position: relative;
  }

  .item:last-child { border-bottom: none; }
  .item:active { background: var(--surface2); }

  .item.done {
    background: var(--done-bg);
  }

  .item.done .item-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  /* Checkbox */
  .check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .tasks  .check { border-color: rgba(232,201,126,0.4); }
  .comms  .check { border-color: rgba(126,184,232,0.4); }
  .home   .check { border-color: rgba(167,139,250,0.4); }

  .item.done .check {
    border-color: transparent;
  }

  .tasks  .item.done .check { background: var(--accent1); }
  .comms  .item.done .check { background: var(--accent2); }
  .home   .item.done .check { background: var(--accent3); }

  .checkmark {
    width: 10px;
    height: 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .item.done .checkmark { opacity: 1; }

  .item-body { flex: 1; min-width: 0; }

  .item-priority {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .tasks  .item-priority { color: var(--accent1); }
  .comms  .item-priority { color: var(--accent2); }
  .home   .item-priority { color: var(--accent3); }

  .item-text {
    font-size: 14px;
    line-height: 1.4;
    color: var(--text);
    transition: color 0.2s;
    word-break: break-word;
  }

  .item-text[contenteditable="true"] {
    outline: none;
    border-bottom: 1px dashed var(--border);
  }

  /* ── ADD BUTTON ── */
  .add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: color 0.15s;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
  }

  .add-btn:hover { color: var(--text); }

  .add-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px dashed currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    line-height: 1;
    flex-shrink: 0;
  }

  /* ── MOTIVATIONAL FOOTER ── */
  .quote {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 4px 24px;
    line-height: 1.6;
    font-style: italic;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: flex-end;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    width: 100%;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px));
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    margin-bottom: 14px;
  }

  .modal input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 15px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    margin-bottom: 12px;
  }

  .modal input:focus { border-color: rgba(255,255,255,0.2); }

  .modal-actions {
    display: flex;
    gap: 10px;
  }

  .btn-cancel {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }

  .btn-add {
    flex: 2;
    padding: 13px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-add:active { opacity: 0.8; }
  .btn-add.tasks-btn { background: var(--accent1); color: #0e1117; }
  .btn-add.comms-btn { background: var(--accent2); color: #0e1117; }
  .btn-add.home-btn  { background: var(--accent3); color: #0e1117; }

  /* delete swipe hint */
  .item-del {
    font-size: 16px;
    opacity: 0;
    transition: opacity 0.2s;
    padding: 2px 0 0 4px;
    cursor: pointer;
    color: var(--muted);
    flex-shrink: 0;
    background: none;
    border: none;
  }

  .item:hover .item-del,
  .item:focus-within .item-del { opacity: 1; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="date-block">
    <h1 id="dateDisplay">Tuesday</h1>
    <p id="fullDate">March 31, 2026</p>
  </div>
  <div class="progress-ring-wrap" title="Overall completion">
    <svg viewBox="0 0 52 52">
      <circle class="ring-bg" cx="26" cy="26" r="22"/>
      <circle class="ring-fill" id="ringFill" cx="26" cy="26" r="22"/>
    </svg>
    <span class="ring-label" id="ringLabel">0%</span>
  </div>
</header>

<!-- MAIN SCROLL -->
<main>

  <!-- TASKS -->
  <div class="section tasks" id="sec-tasks">
    <div class="section-header">
      <div class="section-icon icon-tasks">🎯</div>
      <span class="section-title">Top Priorities</span>
      <span class="section-count" id="cnt-tasks">0/3</span>
    </div>
    <div class="item-list" id="list-tasks"></div>
    <button class="add-btn" onclick="openModal('tasks')">
      <span class="add-icon">+</span> Add task
    </button>
  </div>

  <!-- COMMS -->
  <div class="section comms" id="sec-comms">
    <div class="section-header">
      <div class="section-icon icon-comms">✉️</div>
      <span class="section-title">Communications</span>
      <span class="section-count" id="cnt-comms">0/3</span>
    </div>
    <div class="item-list" id="list-comms"></div>
    <button class="add-btn" onclick="openModal('comms')">
      <span class="add-icon">+</span> Add message
    </button>
  </div>

  <!-- HOME -->
  <div class="section home" id="sec-home">
    <div class="section-header">
      <div class="section-icon icon-home">🏠</div>
      <span class="section-title">Home Tasks</span>
      <span class="section-count" id="cnt-home">0/3</span>
    </div>
    <div class="item-list" id="list-home"></div>
    <button class="add-btn" onclick="openModal('home')">
      <span class="add-icon">+</span> Add home task
    </button>
  </div>

</main>

<p class="quote" id="quoteEl"></p>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3 id="modalTitle">Add Task</h3>
    <input type="text" id="modalInput" placeholder="What needs to be done?" maxlength="120"
           onkeydown="if(event.key==='Enter')confirmAdd()">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-add" id="modalBtn" onclick="confirmAdd()">Add</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const CONFIG = {
  tasks: {
    label: 'Top Priorities',
    priorities: ['P1 · Critical','P2 · Important','P3 · Nice to do'],
    btnClass: 'tasks-btn'
  },
  comms: {
    label: 'Communications',
    priorities: ['Send first','Send second','Send third'],
    btnClass: 'comms-btn'
  },
  home: {
    label: 'Home Tasks',
    priorities: ['Do first','Do second','Do third'],
    btnClass: 'home-btn'
  }
};

const QUOTES = [
  "Small steps every day lead to big results.",
  "Done is better than perfect.",
  "Focus on progress, not perfection.",
  "One task at a time — you've got this.",
  "Your future self will thank you.",
  "Clarity + action = results.",
  "Make it count. Make it happen."
];

const KEY = 'dailyPlanner_v2';

function loadData() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    // Reset daily if date changed
    const today = new Date().toDateString();
    if (parsed.date !== today) return null;
    return parsed;
  } catch { return null; }
}

function saveData() {
  const out = { date: new Date().toDateString(), sections: {} };
  ['tasks','comms','home'].forEach(sec => {
    out.sections[sec] = state[sec];
  });
  try { localStorage.setItem(KEY, JSON.stringify(out)); } catch {}
}

// Initial state
let state = { tasks: [], comms: [], home: [] };

const saved = loadData();
if (saved) {
  state = saved.sections;
} else {
  // Seed defaults
  state.tasks = [
    { id: uid(), text: 'Review morning emails', done: false },
    { id: uid(), text: 'Finish project proposal', done: false },
    { id: uid(), text: 'Team check-in call', done: false }
  ];
  state.comms = [
    { id: uid(), text: 'Reply to client inquiry', done: false },
    { id: uid(), text: 'Send weekly update to team', done: false },
    { id: uid(), text: 'Follow up with vendor', done: false }
  ];
  state.home = [
    { id: uid(), text: 'Grocery run', done: false },
    { id: uid(), text: 'Tidy living room', done: false },
    { id: uid(), text: 'Prepare dinner', done: false }
  ];
}

function uid() { return Math.random().toString(36).slice(2,9); }

// ── DATE ──────────────────────────────────────────────────────────────
(function() {
  const now = new Date();
  document.getElementById('dateDisplay').textContent =
    now.toLocaleDateString('en-US',{weekday:'long'});
  document.getElementById('fullDate').textContent =
    now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('quoteEl').textContent =
    QUOTES[now.getDate() % QUOTES.length];
})();

// ── RENDER ────────────────────────────────────────────────────────────
function render() {
  ['tasks','comms','home'].forEach(sec => renderSection(sec));
  updateProgress();
  saveData();
}

function renderSection(sec) {
  const list = document.getElementById('list-'+sec);
  const cfg  = CONFIG[sec];
  list.innerHTML = '';

  state[sec].slice(0,3).forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'item' + (item.done ? ' done' : '');
    el.setAttribute('data-id', item.id);
    el.innerHTML = `
      <div class="check" onclick="toggle('${sec}','${item.id}')">
        <svg class="checkmark" viewBox="0 0 10 8" fill="none">
          <path d="M1 4l3 3 5-6" stroke="#0e1117" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="item-body">
        <div class="item-priority">${cfg.priorities[i] || ''}</div>
        <div class="item-text">${escHtml(item.text)}</div>
      </div>
      <button class="item-del" onclick="deleteItem('${sec}','${item.id}')" title="Remove">✕</button>
    `;
    list.appendChild(el);
  });

  const done  = state[sec].filter(i=>i.done).length;
  const total = Math.min(state[sec].length, 3);
  document.getElementById('cnt-'+sec).textContent = `${done}/${total}`;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateProgress() {
  const allItems = [...state.tasks, ...state.comms, ...state.home].slice(0,9);
  // cap at 9
  const capped = ['tasks','comms','home'].flatMap(s => state[s].slice(0,3));
  const done  = capped.filter(i=>i.done).length;
  const total = capped.length;
  const pct   = total ? Math.round((done/total)*100) : 0;

  const circ  = 2 * Math.PI * 22; // 138.2
  const fill  = circ - (pct/100)*circ;
  document.getElementById('ringFill').style.strokeDashoffset = fill;
  document.getElementById('ringLabel').textContent = pct+'%';
}

// ── ACTIONS ───────────────────────────────────────────────────────────
function toggle(sec, id) {
  const item = state[sec].find(i=>i.id===id);
  if (item) {
    item.done = !item.done;
    render();
  }
}

function deleteItem(sec, id) {
  state[sec] = state[sec].filter(i=>i.id!==id);
  render();
}

// ── MODAL ─────────────────────────────────────────────────────────────
let currentSec = null;

function openModal(sec) {
  currentSec = sec;
  const cfg = CONFIG[sec];
  document.getElementById('modalTitle').textContent = 'Add to ' + cfg.label;
  document.getElementById('modalBtn').className = 'btn-add ' + cfg.btnClass;
  document.getElementById('modalInput').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('modalInput').focus(), 300);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentSec = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function confirmAdd() {
  const text = document.getElementById('modalInput').value.trim();
  if (!text || !currentSec) return;
  if (state[currentSec].length >= 3) {
    // replace last if already 3
    state[currentSec].pop();
  }
  state[currentSec].push({ id: uid(), text, done: false });
  closeModal();
  render();
}

// ── INIT ─────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
